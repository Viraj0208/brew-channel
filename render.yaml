# Render Blueprint — one-click config for the channel simulation service.
# Render → New → Blueprint → connect this repo → it reads this file.
services:
  - type: web
    name: brew-channel
    runtime: node
    plan: free
    # Render provides pnpm natively (do NOT run `corepack enable` — it tries to
    # write a symlink into a read-only /usr/bin and fails). --prod=false keeps
    # tsx/typescript (devDeps) so `pnpm start` (tsx src/index.ts) runs.
    buildCommand: pnpm install --prod=false
    startCommand: pnpm start
    healthCheckPath: /healthz
    envVars:
      # Must equal the CRM's WORKER_SECRET so /send auth matches. Set at deploy.
      - key: WORKER_SECRET
        sync: false
